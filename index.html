<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apostle's Desk">
<meta name="theme-color" content="#0a0d1f">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Apostle's Desk</title>
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS — SACRED DARK
═══════════════════════════════════════════ */
:root {
  /* Backgrounds */
  --bg:           #0a0d1f;
  --bg-warm:      #0e1228;
  --bg-card:      rgba(255,255,255,0.04);
  --bg-card-2:    rgba(255,255,255,0.025);

  /* Surfaces & Borders */
  --surface:      rgba(255,255,255,0.04);
  --surface-2:    rgba(255,255,255,0.07);
  --border:       rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);

  /* Text */
  --text:         #eeeaf8;
  --text-2:       rgba(238,234,248,0.85);
  --muted:        rgba(238,234,248,0.45);
  --muted-2:      rgba(238,234,248,0.25);

  /* Gold — primary brand */
  --gold:         #c9a227;
  --gold-2:       #d4a017;
  --gold-3:       #e8c84a;
  --gold-bg:      rgba(201,162,39,0.1);
  --gold-border:  rgba(201,162,39,0.3);
  --gold-grad:    linear-gradient(135deg, #c9a227 0%, #e8c84a 60%, #c9a227 100%);
  --gold-glow:    0 0 24px rgba(201,162,39,0.35);

  /* Semantic colors */
  --task:         #d94f4f;
  --task-2:       #f07070;
  --task-bg:      rgba(217,79,79,0.1);
  --task-border:  rgba(217,79,79,0.25);

  --project:      #4b8fd4;
  --project-2:    #7ab3e8;
  --project-bg:   rgba(75,143,212,0.1);
  --project-border:rgba(75,143,212,0.25);

  --complete:     #3d9e6d;
  --complete-bg:  rgba(61,158,109,0.1);
  --complete-border:rgba(61,158,109,0.2);

  --vision-bg:    rgba(201,162,39,0.07);

  /* Shape */
  --radius:       18px;
  --radius-sm:    12px;
  --radius-xs:    8px;

  /* Safe areas */
  --safe-top:     env(safe-area-inset-top, 0px);
  --safe-bottom:  env(safe-area-inset-bottom, 0px);

  /* Typography */
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-ui:      'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;

  /* Shadows */
  --shadow-sm:    0 2px 12px rgba(0,0,0,0.3);
  --shadow-md:    0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:    0 12px 48px rgba(0,0,0,0.5);
  --shadow-sheet: 0 -4px 60px rgba(0,0,0,0.6);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
#app {
  position: relative;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* ═══════════════════════════════════════════
   TEXTURE — SUBTLE PAPER GRAIN
═══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.6;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,39,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(75,143,212,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 10% 60%, rgba(140,80,200,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header {
  position: relative;
  z-index: 200;
  padding-top: calc(var(--safe-top) + 44px);
  background: rgba(10,13,31,0.97);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-crown {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 0 20px 14px;
}

.header-wordmark {}
.header-wordmark h1 {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1;
  color: var(--text);
}
.header-wordmark h1 em {
  font-style: italic;
  background: var(--gold-grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-wordmark .eyebrow {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted-2);
  margin-top: 4px;
  font-family: var(--font-mono);
}

.header-actions { display: flex; gap: 8px; align-items: center; padding-top: 4px; }
.hdr-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}
.hdr-btn:hover { border-color: var(--gold-border); color: var(--gold); background: var(--gold-bg); }
.hdr-btn.active { border-color: var(--gold-border); color: var(--gold); background: var(--gold-bg); }

/* Search */
.search-wrap {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
  opacity: 0;
}
.search-wrap.open { max-height: 56px; opacity: 1; }
.search-inner { padding: 0 20px 12px; position: relative; }
.search-inner::before {
  content: '🔍';
  position: absolute;
  left: 32px; top: 50%; transform: translateY(-55%);
  font-size: 13px; pointer-events: none;
}
.search-inner input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 50px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-ui);
  padding: 9px 16px 9px 36px;
  outline: none;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-inner input::placeholder { color: var(--muted-2); }
.search-inner input:focus {
  border-color: var(--gold-border);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
}

/* ─── STATS STRIP ─── */
.stats-strip {
  display: flex;
  gap: 0;
  overflow: hidden;
  border-top: 1px solid var(--border);
}
.stat-pill {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 8px;
  border-right: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.stat-pill:last-child { border-right: none; }
.stat-pill:hover { background: var(--surface); }
.stat-num {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}
.stat-pill.sv .stat-num { color: var(--gold-2); }
.stat-pill.st .stat-num { color: var(--task); }
.stat-pill.sp .stat-num { color: var(--project); }
.stat-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--font-mono);
  line-height: 1.2;
}

/* ─── header tabs hidden — bottom nav handles filtering ─── */
.nav-tabs { display: none; }

/* ═══════════════════════════════════════════
   SCROLL AREA
═══════════════════════════════════════════ */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 16px 16px calc(var(--safe-bottom) + 96px);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ─── SECTION DIVIDER ─── */
.section-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted-2);
  font-family: var(--font-mono);
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ═══════════════════════════════════════════
   CARDS
═══════════════════════════════════════════ */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.16s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
  box-shadow: var(--shadow-sm);
  animation: cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.card:active { transform: scale(0.977); box-shadow: var(--shadow-sm); }
.card:hover  { box-shadow: var(--shadow-md); transform: translateY(-1px); }

.card.vision  { border-color: var(--gold-border); background: rgba(201,162,39,0.05); }
.card.task    { border-color: var(--task-border); }
.card.project { border-color: var(--project-border); }
.card.done    { opacity: 0.55; background: var(--bg-card-2); }

/* Top accent line */
.card-accent {
  height: 2.5px;
  width: 100%;
}
.card.vision  .card-accent { background: var(--gold-grad); }
.card.task    .card-accent { background: linear-gradient(90deg, var(--task) 0%, var(--task-2) 100%); }
.card.project .card-accent { background: linear-gradient(90deg, var(--project) 0%, var(--project-2) 100%); }
.card.done    .card-accent { background: linear-gradient(90deg, var(--complete), #2ecc71); }

.card-body { padding: 13px 15px 14px; }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.card-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  line-height: 1.3;
  flex: 1;
  color: var(--text);
}
.card.done .card-title { text-decoration: line-through; color: var(--muted); }

.chip {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  font-family: var(--font-mono);
}
.chip.vision  { background: var(--gold-bg);     color: var(--gold);    border: 1px solid var(--gold-border); }
.chip.task    { background: var(--task-bg);     color: var(--task);    border: 1px solid var(--task-border); }
.chip.project { background: var(--project-bg);  color: var(--project); border: 1px solid var(--project-border); }
.chip.done    { background: var(--complete-bg); color: var(--complete); border: 1px solid var(--complete-border); }

.card-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 7px;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
}
.urgent-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--task);
  animation: pulse-dot 1.4s ease-in-out infinite;
  vertical-align: middle;
  margin-right: 2px;
}
@keyframes pulse-dot {
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(192,57,43,0.3)}
  50%{opacity:0.7;box-shadow:0 0 0 4px rgba(192,57,43,0)}
}

.card-notes {
  margin-top: 8px;
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Progress bar */
.card-progress { margin-top: 10px; }
.prog-track {
  height: 3px;
  background: var(--surface-2);
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--project) 0%, var(--project-2) 100%);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.prog-label {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}
.overdue-badge { color: var(--task); font-weight: 600; }

/* Swipe Actions hint */
.card-swipe-hint {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0;
  transition: opacity 0.2s;
  font-size: 11px;
  color: var(--muted-2);
}

/* Empty */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 30px;
  text-align: center;
  gap: 12px;
}
.es-icon {
  font-size: 48px;
  opacity: 0.5;
  display: block;
}
.empty-state h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--text-2);
  font-style: italic;
}
.empty-state p { font-size: 14px; color: var(--muted); max-width: 220px; }

/* ═══════════════════════════════════════════
   FAB
═══════════════════════════════════════════ */
.fab {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 76px);
  right: 20px;
  z-index: 150;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--gold-grad);
  border: none;
  color: #fff;
  font-size: 26px;
  font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: var(--gold-glow), 0 6px 20px rgba(0,0,0,0.15);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
  line-height: 1;
}
.fab:active { transform: scale(0.92); }
.fab:hover  { transform: scale(1.06) translateY(-2px); box-shadow: var(--gold-glow), 0 10px 30px rgba(0,0,0,0.18); }

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 190;
  background: rgba(10,13,31,0.97);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  display: flex;
  box-shadow: 0 -1px 0 rgba(0,0,0,0.05);
}
.nav-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--muted-2);
  padding: 10px 4px 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: color 0.2s;
  position: relative;
}
.nav-btn .ni { font-size: 18px; line-height: 1; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
.nav-btn.active .ni { transform: scale(1.18); }
.nav-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 22%; right: 22%;
  height: 2px;
  border-radius: 0 0 3px 3px;
  opacity: 0;
  transition: opacity 0.2s;
}
.nav-btn.active { color: var(--gold); }
.nav-btn.active::before { opacity: 1; background: var(--gold-grad); }
.nav-btn.active.nt { color: var(--task); }
.nav-btn.active.nt::before { background: var(--task); opacity: 1; }
.nav-btn.active.np { color: var(--project); }
.nav-btn.active.np::before { background: var(--project); opacity: 1; }
.nav-btn.active.nd { color: var(--complete); }
.nav-btn.active.nd::before { background: var(--complete); opacity: 1; }

/* ═══════════════════════════════════════════
   OVERLAY + SHEET
═══════════════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,7,18,0.75);
  z-index: 300;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
.overlay.open { display: flex; }

.sheet {
  background: var(--bg-card);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid var(--border);
  width: 100%;
  max-height: 94dvh;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--safe-bottom) + 24px);
  animation: sheetUp 0.36s cubic-bezier(0.32,0.72,0,1);
  box-shadow: var(--shadow-sheet);
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet-drag {
  width: 36px; height: 4px;
  background: var(--border-strong);
  border-radius: 4px;
  margin: 12px auto 0;
}
.sheet-header {
  padding: 16px 22px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sheet-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}
.sheet-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all 0.15s;
}
.sheet-close:hover { background: var(--task-bg); color: var(--task); border-color: var(--task-border); }

/* ═══════════════════════════════════════════
   FORM
═══════════════════════════════════════════ */
.form-section { padding: 18px 22px 0; }
.form-label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--font-mono);
  margin-bottom: 10px;
}

/* Type selector */
.type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.type-opt {
  padding: 14px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--muted);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--shadow-sm);
}
.type-opt .to-icon { font-size: 22px; display: block; margin-bottom: 5px; }
.type-opt:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.type-opt.selected { transform: scale(1.02); }
.type-opt.selected.vision  { border-color: var(--gold-border); background: var(--gold-bg); color: var(--gold); box-shadow: 0 4px 16px rgba(184,134,11,0.15); }
.type-opt.selected.task    { border-color: var(--task-border);  background: var(--task-bg); color: var(--task); box-shadow: 0 4px 16px rgba(192,57,43,0.1); }
.type-opt.selected.project { border-color: var(--project-border); background: var(--project-bg); color: var(--project); box-shadow: 0 4px 16px rgba(26,95,168,0.1); }

/* Voice row */
.voice-row { display: flex; gap: 10px; align-items: flex-start; }
.voice-row textarea { flex: 1; }
.mic-btn {
  width: 48px; height: 48px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--muted);
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.mic-btn.listening {
  border-color: var(--task-border);
  background: var(--task-bg);
  color: var(--task);
  animation: mic-pulse 0.9s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%,100%{ box-shadow: 0 0 0 0 rgba(192,57,43,0.25); }
  50%    { box-shadow: 0 0 0 8px rgba(192,57,43,0); }
}

/* Inputs */
textarea, input[type=text], input[type=date] {
  width: 100%;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 15px;
  font-family: var(--font-ui);
  padding: 12px 14px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: none;
  box-shadow: var(--shadow-sm);
}
textarea::placeholder, input::placeholder { color: var(--muted-2); }
textarea:focus, input:focus {
  border-color: var(--gold-border);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
}
textarea { min-height: 84px; }

/* Urgency */
.urgency-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
.urg-btn {
  padding: 11px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-2);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.18s;
  box-shadow: var(--shadow-sm);
}
.urg-btn:hover { border-color: var(--gold-border); background: var(--gold-bg); }
.urg-btn.selected {
  border-color: var(--gold-border);
  background: var(--gold-bg);
  color: var(--gold);
  font-weight: 600;
  box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
}

/* Sub-tasks */
.subtask-area { display: none; }
.subtask-area.visible { display: block; }
.subtask-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.subtask-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  padding: 10px 12px;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.15s;
}
.subtask-row:hover { border-color: var(--border-strong); }
.subtask-row input[type=checkbox] {
  width: 17px; height: 17px;
  accent-color: var(--project);
  flex-shrink: 0; cursor: pointer; padding: 0;
}
.subtask-row span { flex: 1; font-size: 13px; color: var(--text-2); }
.subtask-row span.done-text { text-decoration: line-through; color: var(--muted); }
.subtask-row .del-sub {
  background: none; border: none;
  color: var(--muted-2); cursor: pointer;
  font-size: 18px; line-height: 1; padding: 0;
  transition: color 0.15s;
}
.subtask-row .del-sub:hover { color: var(--task); }
.add-sub-row { display: flex; gap: 8px; }
.add-sub-row input { flex: 1; min-height: 0; }
.add-sub-row button {
  width: 44px; height: 44px;
  background: var(--project-bg);
  border: 1.5px solid var(--project-border);
  border-radius: var(--radius-xs);
  color: var(--project);
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.add-sub-row button:hover { background: var(--project); color: #fff; }

/* Save button */
.btn-save {
  width: calc(100% - 44px);
  margin: 20px 22px 0;
  background: var(--gold-grad);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 16px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-ui);
  cursor: pointer;
  letter-spacing: 0.2px;
  box-shadow: var(--gold-glow);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-save:hover { transform: translateY(-1px); box-shadow: var(--gold-glow), 0 8px 24px rgba(0,0,0,0.12); }
.btn-save:active { transform: scale(0.97); }

/* ═══════════════════════════════════════════
   DETAIL SHEET
═══════════════════════════════════════════ */
.detail-hero {
  padding: 20px 22px 18px;
  border-bottom: 1px solid var(--border);
}
.detail-type-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
}
.detail-type-badge.vision  { background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-border); }
.detail-type-badge.task    { background: var(--task-bg); color: var(--task); border: 1px solid var(--task-border); }
.detail-type-badge.project { background: var(--project-bg); color: var(--project); border: 1px solid var(--project-border); }
.detail-type-badge.done    { background: var(--complete-bg); color: var(--complete); border: 1px solid var(--complete-border); }
.detail-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  line-height: 1.25;
  letter-spacing: -0.3px;
  color: var(--text);
}

.detail-info {
  padding: 4px 22px 0;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.detail-row:last-child { border-bottom: none; }
.detail-row .dk {
  font-size: 12px;
  color: var(--muted);
  font-family: var(--font-mono);
  flex-shrink: 0;
}
.detail-row .dv {
  font-size: 13px;
  font-weight: 500;
  text-align: right;
  color: var(--text-2);
}

.detail-notes {
  margin: 4px 22px 0;
  padding: 14px;
  background: var(--bg-warm);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.detail-notes .dnlabel {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted-2);
  font-family: var(--font-mono);
  margin-bottom: 8px;
}
.detail-notes .dncopy {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-2);
}

.detail-subs {
  padding: 16px 22px 0;
}
.detail-subs .dslabel {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted-2);
  font-family: var(--font-mono);
  margin-bottom: 10px;
}
.detail-sub-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.detail-sub-item input[type=checkbox] {
  width: 17px; height: 17px;
  accent-color: var(--project);
  cursor: pointer; flex-shrink: 0;
}
.detail-sub-item label {
  font-size: 14px;
  cursor: pointer;
  flex: 1;
  color: var(--text-2);
}
.detail-sub-item label.done-text { text-decoration: line-through; color: var(--muted); }

/* Action buttons */
.action-row {
  display: flex; gap: 8px;
  padding: 16px 22px 0;
  flex-wrap: wrap;
}
.act-btn {
  flex: 1;
  min-width: 100px;
  padding: 13px 10px;
  border-radius: var(--radius-sm);
  border: 1.5px solid transparent;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.act-btn:active { transform: scale(0.96); }
.act-btn:hover  { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.act-btn.complete { background: var(--complete-bg);  color: var(--complete); border-color: var(--complete-border); }
.act-btn.reopen   { background: var(--surface-2);    color: var(--muted);    border-color: var(--border); }
.act-btn.edit     { background: var(--bg-card);       color: var(--text-2);   border-color: var(--border); }
.act-btn.share    { background: var(--project-bg);   color: var(--project);  border-color: var(--project-border); }
.act-btn.delete   { background: var(--task-bg);      color: var(--task);     border-color: var(--task-border); flex: 0 0 auto; width: 100%; }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 96px);
  left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: rgba(20,24,44,0.96);
  color: var(--text);
  border: 1px solid var(--gold-border);
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.22s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  white-space: nowrap;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header-crown">
      <div class="header-wordmark">
        <h1>Apostle's <em>Desk</em></h1>
        <p class="eyebrow">Christ Cathedral · Media Ministry</p>
      </div>
      <div class="header-actions">
        <button class="hdr-btn" id="searchToggle" onclick="toggleSearch()" title="Search">🔍</button>
        <button class="hdr-btn" id="exportBtn" onclick="exportAll()" title="Export">📤</button>
      </div>
    </div>
    <div class="search-wrap" id="searchWrap">
      <div class="search-inner">
        <input type="search" id="searchInput" placeholder="Search instructions…" autocomplete="off" oninput="render()">
      </div>
    </div>
    <!-- Stats strip -->
    <div class="stats-strip">
      <div class="stat-pill sv" onclick="setFilter('vision',document.querySelector('[data-filter=vision]'))">
        <span class="stat-num" id="sv">0</span>
        <div>
          <div class="stat-label">Vision</div>
        </div>
      </div>
      <div class="stat-pill st" onclick="setFilter('task',document.querySelector('[data-filter=task]'))">
        <span class="stat-num" id="st">0</span>
        <div>
          <div class="stat-label">Tasks</div>
        </div>
      </div>
      <div class="stat-pill sp" onclick="setFilter('project',document.querySelector('[data-filter=project]'))">
        <span class="stat-num" id="sp">0</span>
        <div>
          <div class="stat-label">Projects</div>
        </div>
      </div>
    </div>
    <!-- Filter tabs -->
    <div class="nav-tabs">
      <button class="tab-btn active" data-filter="all" onclick="setFilter('all',this)">
        <span class="ti">🏛</span>All
      </button>
      <button class="tab-btn" data-filter="vision" onclick="setFilter('vision',this)">
        <span class="ti">👁</span>Vision
      </button>
      <button class="tab-btn tt" data-filter="task" onclick="setFilter('task',this)">
        <span class="ti">⚡</span>Tasks
      </button>
      <button class="tab-btn tp" data-filter="project" onclick="setFilter('project',this)">
        <span class="ti">📋</span>Projects
      </button>
      <button class="tab-btn td" data-filter="done" onclick="setFilter('done',this)">
        <span class="ti">✅</span>Done
      </button>
    </div>
  </header>

  <!-- ── CARD LIST ── -->
  <div class="scroll-area" id="cardsList"></div>

  <!-- ── FAB ── -->
  <button class="fab" onclick="openAdd()" aria-label="New instruction">+</button>

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-bar">
    <button class="nav-btn active" data-filter="all" onclick="setFilter('all',this)">
      <span class="ni">🏛</span>All
    </button>
    <button class="nav-btn" data-filter="vision" onclick="setFilter('vision',this)">
      <span class="ni">👁</span>Vision
    </button>
    <button class="nav-btn nt" data-filter="task" onclick="setFilter('task',this)">
      <span class="ni">⚡</span>Tasks
    </button>
    <button class="nav-btn np" data-filter="project" onclick="setFilter('project',this)">
      <span class="ni">📋</span>Projects
    </button>
    <button class="nav-btn nd" data-filter="done" onclick="setFilter('done',this)">
      <span class="ni">✅</span>Done
    </button>
  </nav>
</div>

<!-- ── ADD / EDIT OVERLAY ── -->
<div class="overlay" id="addOverlay" onclick="overlayTap(event,'addOverlay')">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" id="formHeading">New Instruction</h2>
      <button class="sheet-close" onclick="closeSheet('addOverlay')">✕</button>
    </div>

    <div class="form-section">
      <label class="form-label">Type of Instruction</label>
      <div class="type-grid">
        <button class="type-opt vision selected" onclick="pickType('vision',this)">
          <span class="to-icon">👁</span>Vision
        </button>
        <button class="type-opt task" onclick="pickType('task',this)">
          <span class="to-icon">⚡</span>Task
        </button>
        <button class="type-opt project" onclick="pickType('project',this)">
          <span class="to-icon">📋</span>Project
        </button>
      </div>
    </div>

    <div class="form-section">
      <label class="form-label">Instruction</label>
      <div class="voice-row">
        <textarea id="fTitle" placeholder="What did Apostle Lykes say or instruct?" rows="3"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Voice input">🎤</button>
      </div>
    </div>

    <div class="form-section">
      <label class="form-label">Urgency</label>
      <div class="urgency-grid">
        <button class="urg-btn selected" onclick="pickUrgency('immediate',this)">⚡ Immediate (48hr)</button>
        <button class="urg-btn" onclick="pickUrgency('week',this)">📅 This Week</button>
        <button class="urg-btn" onclick="pickUrgency('month',this)">🗓 This Month</button>
        <button class="urg-btn" onclick="pickUrgency('longterm',this)">🌅 Long-term</button>
      </div>
    </div>

    <div class="form-section">
      <label class="form-label">Due Date <span style="font-weight:400;letter-spacing:0;text-transform:none;color:var(--muted-2)">(optional)</span></label>
      <input type="date" id="fDue">
    </div>

    <div class="form-section">
      <label class="form-label">Notes & Context</label>
      <textarea id="fNotes" placeholder="Background, context, or additional details…" rows="3"></textarea>
    </div>

    <div class="form-section" id="prioritySection">
      <label class="form-label">Priority Tag <span style="font-weight:400;letter-spacing:0;text-transform:none;color:var(--muted-2)">(optional)</span></label>
      <input type="text" id="fTag" placeholder="e.g. Broadcast, Bulletin, Social Media…">
    </div>

    <div class="form-section subtask-area" id="subtaskArea">
      <label class="form-label">Sub-tasks</label>
      <div class="subtask-list" id="subtaskList"></div>
      <div class="add-sub-row">
        <input type="text" id="subInput" placeholder="Add a step…" onkeydown="if(event.key==='Enter'){event.preventDefault();addSub();}">
        <button onclick="addSub()">+</button>
      </div>
    </div>

    <button class="btn-save" onclick="saveItem()">Save Instruction</button>
  </div>
</div>

<!-- ── DETAIL OVERLAY ── -->
<div class="overlay" id="detailOverlay" onclick="overlayTap(event,'detailOverlay')">
  <div class="sheet" id="detailSheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─── STATE ─── */
let data      = JSON.parse(localStorage.getItem('apostlesdesk_v3') || '[]');
let filter    = 'all';
let editId    = null;
let selType   = 'vision';
let selUrg    = 'immediate';
let subs      = [];
let recog     = null;
let listening = false;

const URG = {
  immediate: '⚡ Immediate (48hr)',
  week:      '📅 This Week',
  month:     '🗓 This Month',
  longterm:  '🌅 Long-term'
};
const URG_ORDER = { immediate:0, week:1, month:2, longterm:3 };

/* ─── HELPERS ─── */
const save    = () => localStorage.setItem('apostlesdesk_v3', JSON.stringify(data));
const uid     = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const esc     = s => s?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') || '';
const fmtDate = d => {
  if (!d) return '';
  const dt = new Date(d.includes('T') ? d : d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
};
const isOverdue = d => d && new Date(d + 'T00:00:00') < new Date(new Date().toDateString());

function toast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), duration);
}

/* ─── SEARCH ─── */
function toggleSearch() {
  const w = document.getElementById('searchWrap');
  const b = document.getElementById('searchToggle');
  const open = w.classList.toggle('open');
  b.classList.toggle('active', open);
  if (open) setTimeout(() => document.getElementById('searchInput').focus(), 300);
  else { document.getElementById('searchInput').value = ''; render(); }
}

/* ─── FILTER — syncs header tabs + bottom nav ─── */
function setFilter(f, btn) {
  filter = f;
  // sync all nav buttons
  document.querySelectorAll('.nav-btn,.tab-btn').forEach(b => b.classList.remove('active'));
  // activate matching buttons in both bars
  document.querySelectorAll(`[data-filter="${f}"]`).forEach(b => b.classList.add('active'));
  render();
}

/* ─── VOICE ─── */
function toggleVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) { toast('Voice input not supported in this browser'); return; }
  if (listening) { recog.stop(); return; }
  recog = new SpeechRec();
  recog.continuous    = true;
  recog.interimResults = false;
  recog.lang           = 'en-US';
  recog.onstart  = () => { listening = true;  document.getElementById('micBtn').classList.add('listening'); };
  recog.onresult = e  => {
    const f = document.getElementById('fTitle');
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        f.value = (f.value ? f.value.trimEnd() + ' ' : '') + e.results[i][0].transcript;
      }
    }
  };
  recog.onend    = () => { listening = false; document.getElementById('micBtn').classList.remove('listening'); };
  recog.onerror  = () => { listening = false; document.getElementById('micBtn').classList.remove('listening'); toast('Voice error — try again'); };
  recog.start();
}

/* ─── TYPE / URGENCY ─── */
function pickType(t, btn) {
  selType = t;
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('subtaskArea').classList.toggle('visible', t === 'project');
}
function pickUrgency(u, btn) {
  selUrg = u;
  document.querySelectorAll('.urg-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

/* ─── SUB-TASKS ─── */
function addSub() {
  const inp = document.getElementById('subInput');
  const val = inp.value.trim();
  if (!val) return;
  subs.push({ id: uid(), text: val, done: false });
  inp.value = '';
  renderSubs();
  inp.focus();
}
function toggleSub(id) { const s = subs.find(x=>x.id===id); if(s){s.done=!s.done;renderSubs();} }
function removeSub(id) { subs = subs.filter(x=>x.id!==id); renderSubs(); }
function renderSubs() {
  document.getElementById('subtaskList').innerHTML = subs.map(s => `
    <div class="subtask-row">
      <input type="checkbox" ${s.done?'checked':''} onchange="toggleSub('${s.id}')">
      <span class="${s.done?'done-text':''}">${esc(s.text)}</span>
      <button class="del-sub" onclick="removeSub('${s.id}')">×</button>
    </div>`).join('');
}

/* ─── OPEN ADD ─── */
function openAdd() {
  editId = null; selType = 'vision'; selUrg = 'immediate'; subs = [];
  document.getElementById('formHeading').textContent = 'New Instruction';
  document.getElementById('fTitle').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('fDue').value   = '';
  document.getElementById('fTag').value   = '';
  document.getElementById('subtaskArea').classList.remove('visible');
  document.getElementById('subtaskList').innerHTML = '';
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector('.type-opt.vision').classList.add('selected');
  document.querySelectorAll('.urg-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.urg-btn')[0].classList.add('selected');
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 380);
}

/* ─── EDIT ITEM ─── */
function editItem(id) {
  const item = data.find(x=>x.id===id);
  if (!item) return;
  closeSheet('detailOverlay');
  editId = id; selType = item.type; selUrg = item.urgency;
  subs = JSON.parse(JSON.stringify(item.subtasks||[]));
  document.getElementById('formHeading').textContent = 'Edit Instruction';
  document.getElementById('fTitle').value = item.title;
  document.getElementById('fNotes').value = item.notes||'';
  document.getElementById('fDue').value   = item.due||'';
  document.getElementById('fTag').value   = item.tag||'';
  document.querySelectorAll('.type-opt').forEach(b=>b.classList.remove('selected'));
  document.querySelector(`.type-opt.${item.type}`)?.classList.add('selected');
  const urgs=['immediate','week','month','longterm'];
  document.querySelectorAll('.urg-btn').forEach((b,i)=>{b.classList.remove('selected');if(urgs[i]===item.urgency)b.classList.add('selected');});
  document.getElementById('subtaskArea').classList.toggle('visible', item.type==='project');
  renderSubs();
  document.getElementById('addOverlay').classList.add('open');
}

/* ─── SAVE ─── */
function saveItem() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) {
    document.getElementById('fTitle').focus();
    document.getElementById('fTitle').style.borderColor = 'var(--task-border)';
    setTimeout(() => document.getElementById('fTitle').style.borderColor = '', 1500);
    return;
  }
  const tag = document.getElementById('fTag')?.value.trim() || '';
  if (editId) {
    const idx = data.findIndex(x=>x.id===editId);
    if (idx>-1) data[idx] = {...data[idx], title, type:selType, urgency:selUrg,
      due: document.getElementById('fDue').value,
      notes: document.getElementById('fNotes').value.trim(),
      tag,
      subtasks: [...subs]
    };
    toast('✦ Updated');
  } else {
    data.unshift({
      id: uid(), title, type: selType, urgency: selUrg,
      due: document.getElementById('fDue').value,
      notes: document.getElementById('fNotes').value.trim(),
      tag,
      status: 'active',
      created: new Date().toISOString(),
      subtasks: []
    });
    toast('✦ Saved');
  }
  save(); closeSheet('addOverlay'); render();
}

/* ─── DETAIL ─── */
function openDetail(id) {
  const item = data.find(x=>x.id===id);
  if (!item) return;
  const done = item.status === 'done';
  const over = !done && isOverdue(item.due);
  const ss   = item.subtasks||[];
  const dc   = ss.filter(s=>s.done).length;
  const pct  = ss.length ? Math.round(dc/ss.length*100) : 0;

  let subHTML = '';
  if (ss.length) {
    subHTML = `<div class="detail-subs">
      <div class="dslabel">Sub-tasks (${dc}/${ss.length} done)</div>
      ${ss.map(s=>`<div class="detail-sub-item">
        <input type="checkbox" id="ds_${s.id}" ${s.done?'checked':''} onchange="detailToggleSub('${id}','${s.id}')">
        <label for="ds_${s.id}" class="${s.done?'done-text':''}">${esc(s.text)}</label>
      </div>`).join('')}
    </div>`;
  }

  document.getElementById('detailSheet').innerHTML = `
    <div class="sheet-drag"></div>
    <div class="sheet-header">
      <div></div>
      <button class="sheet-close" onclick="closeSheet('detailOverlay')">✕</button>
    </div>
    <div class="detail-hero">
      <div class="detail-type-badge ${done?'done':item.type}">${item.type.toUpperCase()}${item.tag?` · ${esc(item.tag)}`:''}</div>
      <div class="detail-title">${esc(item.title)}</div>
      ${ss.length ? `<div style="margin-top:14px">
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="prog-label">${dc}/${ss.length} steps complete · ${pct}%</div>
      </div>` : ''}
    </div>
    <div class="detail-info">
      <div class="detail-row"><span class="dk">Urgency</span><span class="dv">${URG[item.urgency]||item.urgency}</span></div>
      <div class="detail-row"><span class="dk">Status</span><span class="dv">${done?'✅ Complete':'🔵 Active'}</span></div>
      <div class="detail-row"><span class="dk">Received</span><span class="dv">${fmtDate(item.created)}</span></div>
      ${item.due?`<div class="detail-row"><span class="dk">Due</span><span class="dv ${over?'overdue-badge':''}">${over?'⚠️ Overdue · ':''}${fmtDate(item.due)}</span></div>`:''}
    </div>
    ${item.notes?`<div class="detail-notes"><div class="dnlabel">Notes</div><div class="dncopy">${esc(item.notes)}</div></div>`:''}
    ${subHTML}
    <div class="action-row">
      ${!done
        ? `<button class="act-btn complete" onclick="markDone('${id}')">✅ Mark Complete</button>`
        : `<button class="act-btn reopen"  onclick="markActive('${id}')">↩️ Reopen</button>`}
      <button class="act-btn edit"  onclick="editItem('${id}')">✏️ Edit</button>
      <button class="act-btn share" onclick="shareItem('${id}')">📤 Share</button>
    </div>
    <div class="action-row">
      <button class="act-btn delete" onclick="deleteItem('${id}')">🗑 Delete Instruction</button>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function detailToggleSub(itemId, subId) {
  const item = data.find(x=>x.id===itemId);
  if (!item) return;
  const sub = (item.subtasks||[]).find(s=>s.id===subId);
  if (sub) { sub.done=!sub.done; save(); openDetail(itemId); }
}
function markDone(id) {
  const item = data.find(x=>x.id===id);
  if (item) {
    item.status='done'; item.completedAt=new Date().toISOString();
    save(); closeSheet('detailOverlay'); render(); toast('✅ Marked complete');
  }
}
function markActive(id) {
  const item = data.find(x=>x.id===id);
  if (item) { item.status='active'; delete item.completedAt; save(); closeSheet('detailOverlay'); render(); toast('↩️ Reopened'); }
}
function deleteItem(id) {
  if (!confirm('Delete this instruction?')) return;
  data = data.filter(x=>x.id!==id);
  save(); closeSheet('detailOverlay'); render(); toast('Deleted');
}
function shareItem(id) {
  const item = data.find(x=>x.id===id);
  if (!item) return;
  const ss = (item.subtasks||[]).map(s=>`  ${s.done?'☑':'☐'} ${s.text}`).join('\n');
  const txt = `APOSTLE'S DESK\n${'─'.repeat(32)}\nType: ${item.type.toUpperCase()}\nUrgency: ${URG[item.urgency]}\n${item.due?'Due: '+fmtDate(item.due)+'\n':''}\n${item.title}${item.notes?\'\n\nNotes:\n\'+item.notes:\'\'${ss?\'\n\nSub-tasks:\n\'+ss:\'\'}}\n${'─'.repeat(32)}\nChrist Cathedral of Deliverance · Media Ministry`;
  if (navigator.share) navigator.share({ title:"Apostle's Desk", text:txt });
  else navigator.clipboard.writeText(txt).then(()=>toast('📋 Copied to clipboard'));
}

/* ─── EXPORT ALL ─── */
function exportAll() {
  const active = data.filter(x=>x.status!=='done');
  const done   = data.filter(x=>x.status==='done');
  let out = `APOSTLE'S DESK — FULL EXPORT\nChrist Cathedral of Deliverance · Media Ministry\nGenerated: ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}\n${'═'.repeat(40)}\n\nACTIVE INSTRUCTIONS (${active.length})\n${'─'.repeat(40)}\n`;
  active.forEach(item => {
    const ss = (item.subtasks||[]).map(s=>`    ${s.done?'☑':'☐'} ${s.text}`).join('\n');
    out += `\n[${item.type.toUpperCase()}] ${item.title}\nUrgency: ${URG[item.urgency]}${item.due?'\nDue: '+fmtDate(item.due):''}\n${item.notes?'Notes: '+item.notes+'\n':''}${ss?'Steps:\n'+ss+'\n':''}\n`;
  });
  if (done.length) {
    out += `\nCOMPLETED (${done.length})\n${'─'.repeat(40)}\n`;
    done.forEach(item => { out += `✅ ${item.title} — ${fmtDate(item.completedAt||item.created)}\n`; });
  }
  if (navigator.share) navigator.share({ title:"Apostle's Desk Export", text:out });
  else navigator.clipboard.writeText(out).then(()=>toast('📋 Full export copied'));
}

/* ─── OVERLAY ─── */
function overlayTap(e,id) { if (e.target.classList.contains('overlay')) closeSheet(id); }
function closeSheet(id)   { document.getElementById(id).classList.remove('open'); }

/* ─── RENDER ─── */
function render() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  const active = data.filter(x=>x.status!=='done');

  document.getElementById('sv').textContent = active.filter(x=>x.type==='vision').length;
  document.getElementById('st').textContent = active.filter(x=>x.type==='task').length;
  document.getElementById('sp').textContent = active.filter(x=>x.type==='project').length;

  let list = filter==='all'     ? data.filter(x=>x.status!=='done')
           : filter==='done'    ? data.filter(x=>x.status==='done')
           : data.filter(x=>x.type===filter && x.status!=='done');

  if (q) list = list.filter(x=>
    x.title.toLowerCase().includes(q) ||
    (x.notes||'').toLowerCase().includes(q) ||
    (x.tag||'').toLowerCase().includes(q)
  );
  list.sort((a,b)=>(URG_ORDER[a.urgency]??4)-(URG_ORDER[b.urgency]??4));

  const el = document.getElementById('cardsList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <span class="es-icon">${filter==='done'?'✦':q?'🔍':'✦'}</span>
      <h3>${q?`Nothing found for "${q}"`  :filter==='done'?'No completed instructions yet.':'Begin by adding the first instruction.'}</h3>
      <p>${q?'Try a different search term':filter==='done'?'Completed items will appear here.':'Tap + to capture Apostle Lykes\' instructions.'}</p>
    </div>`;
    return;
  }

  let html='', lastUrg=null;
  list.forEach((item, idx) => {
    if (!q && filter==='all' && item.urgency!==lastUrg) {
      lastUrg = item.urgency;
      const lbls={immediate:'⚡ Immediate',week:'📅 This Week',month:'🗓 This Month',longterm:'🌅 Long-term'};
      html+=`<div class="section-label">${lbls[item.urgency]||item.urgency}</div>`;
    }
    const done = item.status==='done';
    const over = !done && isOverdue(item.due);
    const ss   = item.subtasks||[];
    const dc   = ss.filter(s=>s.done).length;
    const pct  = ss.length ? Math.round(dc/ss.length*100) : 0;
    const delay = `animation-delay:${idx*0.045}s`;

    html+=`<div class="card ${done?'done':item.type}" style="${delay}" onclick="openDetail('${item.id}')">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title">${esc(item.title)}</div>
          <span class="chip ${done?'done':item.type}">${done?'Done':item.type.charAt(0).toUpperCase()+item.type.slice(1)}</span>
        </div>
        <div class="card-meta">
          <span>${URG[item.urgency]||''}</span>
          ${item.tag?`<span style="background:var(--surface-2);padding:1px 7px;border-radius:20px;font-size:9.5px">${esc(item.tag)}</span>`:''}
          ${item.due?`<span class="${over?'overdue-badge':''}">${over?'⚠️ Overdue':'📅 '+fmtDate(item.due)}</span>`:''}
          ${item.urgency==='immediate'&&!done?`<span><span class="urgent-dot"></span>Urgent</span>`:''}
        </div>
        ${item.notes?`<div class="card-notes">${esc(item.notes)}</div>`:''}
        ${ss.length?`<div class="card-progress">
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="prog-label">${dc}/${ss.length} steps — ${pct}%</div>
        </div>`:''}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

/* ─── KEYBOARD SHORTCUTS ─── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSheet('addOverlay');
    closeSheet('detailOverlay');
  }
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    toggleSearch();
  }
});

render();
</script>
</body>
</html>
