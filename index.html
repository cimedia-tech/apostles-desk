<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apostle's Desk">
<meta name="theme-color" content="#1a1035">
<link rel="manifest" href="manifest.json">
<title>Apostle's Desk</title>
<style>
  :root {
    --bg: #0f0c24;
    --surface: #1a1640;
    --surface2: #231e52;
    --border: rgba(255,255,255,0.08);
    --text: #f0eeff;
    --muted: #9490b8;
    --vision: #c9a227;
    --vision-bg: rgba(201,162,39,0.12);
    --task: #e05252;
    --task-bg: rgba(224,82,82,0.12);
    --project: #4d9de0;
    --project-bg: rgba(77,157,224,0.12);
    --complete: #4caf7d;
    --complete-bg: rgba(76,175,125,0.10);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #1a1035 0%, #2d1b6b 100%); padding: calc(var(--safe-top) + 54px) 20px 0; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: center; padding-bottom: 14px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--vision); }
  .header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .icon-btn { background: var(--surface2); border: none; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text); }
  .add-btn { background: var(--vision); color: #000; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 300; flex-shrink: 0; }

  /* SEARCH */
  .search-bar { padding: 0 20px 14px; display: none; }
  .search-bar.open { display: block; }
  .search-bar input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; padding: 10px 14px; font-family: inherit; outline: none; }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar input:focus { border-color: var(--vision); }

  /* FILTER TABS */
  .filters { display: flex; gap: 8px; padding: 0 20px 14px; overflow-x: auto; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
  .filter-btn.active { color: #fff; border-color: transparent; }
  .filter-btn.active.all { background: var(--surface2); color: #fff; }
  .filter-btn.active.vision { background: var(--vision); color: #000; }
  .filter-btn.active.task { background: var(--task); color: #fff; }
  .filter-btn.active.project { background: var(--project); color: #fff; }
  .filter-btn.active.done { background: var(--complete); color: #fff; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px 20px; }
  .stat { background: var(--surface); border-radius: var(--radius); padding: 12px; text-align: center; border: 1px solid var(--border); }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat.vision .num { color: var(--vision); }
  .stat.task .num { color: var(--task); }
  .stat.project .num { color: var(--project); }

  /* CARDS */
  .cards { padding: 0 20px 120px; display: flex; flex-direction: column; gap: 12px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-top: 8px; margin-bottom: 4px; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform 0.15s; position: relative; }
  .card:active { transform: scale(0.98); }
  .card-accent { height: 4px; }
  .card.vision .card-accent { background: var(--vision); }
  .card.task .card-accent { background: var(--task); }
  .card.project .card-accent { background: var(--project); }
  .card.done .card-accent { background: var(--complete); }
  .card-body { padding: 14px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.3; flex: 1; }
  .card.done .card-title { opacity: 0.5; text-decoration: line-through; }
  .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge.vision { background: var(--vision-bg); color: var(--vision); }
  .badge.task { background: var(--task-bg); color: var(--task); }
  .badge.project { background: var(--project-bg); color: var(--project); }
  .badge.done { background: var(--complete-bg); color: var(--complete); }
  .card-meta { display: flex; gap: 10px; margin-top: 8px; font-size: 12px; color: var(--muted); flex-wrap: wrap; align-items: center; }
  .card-notes { margin-top: 8px; font-size: 13px; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .subtask-preview { margin-top: 8px; }
  .subtask-bar { background: var(--surface2); border-radius: 4px; height: 4px; overflow: hidden; }
  .subtask-fill { height: 100%; background: var(--project); border-radius: 4px; transition: width 0.3s; }
  .subtask-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .urgent-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--task); display: inline-block; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .overdue-tag { font-size: 11px; color: var(--task); font-weight: 600; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* OVERLAY / SHEET */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: flex-end; }
  .overlay.open { display: flex; }
  .sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 92dvh; overflow-y: auto; padding: 0 0 calc(var(--safe-bottom) + 20px); animation: slideUp 0.28s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 12px auto 20px; }
  .sheet-title { font-size: 18px; font-weight: 700; padding: 0 20px; margin-bottom: 20px; }

  /* FORM */
  .form-group { padding: 0 20px; margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; padding: 12px 14px; font-family: inherit; outline: none; -webkit-appearance: none; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--vision); }
  .form-group textarea { min-height: 80px; resize: none; }
  .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .type-opt { padding: 12px 8px; border-radius: 10px; border: 2px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
  .type-opt .icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .type-opt.selected.vision { border-color: var(--vision); background: var(--vision-bg); color: var(--vision); }
  .type-opt.selected.task { border-color: var(--task); background: var(--task-bg); color: var(--task); }
  .type-opt.selected.project { border-color: var(--project); background: var(--project-bg); color: var(--project); }
  .urgency-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .urgency-opt { padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.2s; }
  .urgency-opt.selected { border-color: var(--vision); background: var(--vision-bg); color: var(--vision); }
  .voice-row { display: flex; gap: 10px; align-items: flex-start; }
  .voice-row textarea { flex: 1; }
  .mic-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; flex-shrink: 0; margin-top: 0; transition: all 0.2s; }
  .mic-btn.listening { background: var(--task-bg); border-color: var(--task); animation: pulse 1s infinite; }

  /* SUBTASKS */
  .subtasks-section { padding: 0 20px; margin-bottom: 16px; }
  .subtask-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .subtask-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--border); }
  .subtask-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--project); cursor: pointer; flex-shrink: 0; }
  .subtask-item span { flex: 1; font-size: 14px; }
  .subtask-item span.checked { text-decoration: line-through; color: var(--muted); }
  .subtask-item .del-sub { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
  .add-subtask-row { display: flex; gap: 8px; }
  .add-subtask-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 12px; font-family: inherit; outline: none; }
  .add-subtask-row input:focus { border-color: var(--project); }
  .add-subtask-row button { background: var(--project-bg); border: 1px solid var(--project); border-radius: 10px; color: var(--project); font-size: 18px; width: 42px; cursor: pointer; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; padding: 0 20px; margin-top: 8px; }
  .btn-save { flex: 1; background: var(--vision); color: #000; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: none; border-radius: 12px; padding: 16px 20px; font-size: 16px; cursor: pointer; }
  .btn-full { display: block; width: calc(100% - 40px); margin: 10px 20px 0; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
  .btn-complete { background: var(--complete-bg); color: var(--complete); }
  .btn-edit { background: var(--surface2); color: var(--text); }
  .btn-share { background: var(--project-bg); color: var(--project); }
  .btn-delete { background: var(--task-bg); color: var(--task); }

  /* DETAIL */
  .detail-header { padding: 0 20px 16px; border-bottom: 1px solid var(--border); }
  .detail-type { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .detail-type.vision { color: var(--vision); }
  .detail-type.task { color: var(--task); }
  .detail-type.project { color: var(--project); }
  .detail-title { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .detail-body { padding: 16px 20px 8px; }
  .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .detail-row .key { color: var(--muted); }
  .detail-row .val { font-weight: 600; text-align: right; max-width: 65%; }
  .detail-notes { margin-top: 16px; font-size: 14px; line-height: 1.6; color: var(--muted); }
  .detail-notes strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-subtasks { margin-top: 16px; }
  .detail-subtasks strong { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); display: block; margin-bottom: 10px; }
  .detail-sub-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .detail-sub-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--project); cursor: pointer; }
  .detail-sub-item label { font-size: 14px; cursor: pointer; flex: 1; }
  .detail-sub-item label.checked { text-decoration: line-through; color: var(--muted); }

  /* TOAST */
  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 80px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--complete); color: #fff; padding: 12px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Apostle's <span>Desk</span></h1>
      <div class="subtitle">Christ Cathedral · Media Ministry</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleSearch()" title="Search">🔍</button>
      <button class="add-btn" onclick="openAdd()">+</button>
    </div>
  </div>
  <div class="search-bar" id="searchBar">
    <input type="search" id="searchInput" placeholder="Search instructions..." oninput="render()" autocomplete="off">
  </div>
  <div class="filters">
    <button class="filter-btn active all" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn vision" data-filter="vision" onclick="setFilter('vision',this)">👁 Vision</button>
    <button class="filter-btn task" data-filter="task" onclick="setFilter('task',this)">⚡ Tasks</button>
    <button class="filter-btn project" data-filter="project" onclick="setFilter('project',this)">📋 Projects</button>
    <button class="filter-btn done" data-filter="done" onclick="setFilter('done',this)">✅ Done</button>
  </div>
</div>

<div class="stats">
  <div class="stat vision"><div class="num" id="stat-vision">0</div><div class="label">Vision</div></div>
  <div class="stat task"><div class="num" id="stat-task">0</div><div class="label">Tasks</div></div>
  <div class="stat project"><div class="num" id="stat-project">0</div><div class="label">Projects</div></div>
</div>

<div class="cards" id="cards"></div>

<div class="toast" id="toast"></div>

<!-- ADD/EDIT SHEET -->
<div class="overlay" id="addOverlay" onclick="overlayClick(event,'addOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="formTitle">New Instruction</div>
    <div class="form-group">
      <label>Type</label>
      <div class="type-grid">
        <button class="type-opt vision selected" onclick="selectType('vision',this)"><span class="icon">👁</span>Vision</button>
        <button class="type-opt task" onclick="selectType('task',this)"><span class="icon">⚡</span>Task</button>
        <button class="type-opt project" onclick="selectType('project',this)"><span class="icon">📋</span>Project</button>
      </div>
    </div>
    <div class="form-group">
      <label>Instruction</label>
      <div class="voice-row">
        <textarea id="f-title" placeholder="What did Apostle Lykes say or instruct?" rows="3"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Voice input">🎤</button>
      </div>
    </div>
    <div class="form-group">
      <label>Urgency</label>
      <div class="urgency-grid">
        <button class="urgency-opt selected" onclick="selectUrgency('immediate',this)">⚡ Immediate (48hr)</button>
        <button class="urgency-opt" onclick="selectUrgency('week',this)">📅 This Week</button>
        <button class="urgency-opt" onclick="selectUrgency('month',this)">🗓 This Month</button>
        <button class="urgency-opt" onclick="selectUrgency('longterm',this)">🌅 Long-term</button>
      </div>
    </div>
    <div class="form-group">
      <label>Due Date <span style="color:var(--muted);font-weight:400;text-transform:none">(optional)</span></label>
      <input type="date" id="f-due">
    </div>
    <div class="form-group">
      <label>Notes / Context</label>
      <textarea id="f-notes" placeholder="Background, details, related context..." rows="3"></textarea>
    </div>
    <div class="subtasks-section" id="subtasksSection" style="display:none">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Sub-tasks</label>
      <div class="subtask-list" id="subtaskList"></div>
      <div class="add-subtask-row">
        <input type="text" id="subtaskInput" placeholder="Add a step..." onkeydown="if(event.key==='Enter'){event.preventDefault();addSubtask();}">
        <button onclick="addSubtask()">+</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSheet('addOverlay')">Cancel</button>
      <button class="btn-save" onclick="saveInstruction()">Save</button>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="detailOverlay" onclick="overlayClick(event,'detailOverlay')">
  <div class="sheet" id="detailSheet"></div>
</div>

<script>
let instructions = JSON.parse(localStorage.getItem('apostlesdesk_v2') || '[]');
let currentFilter = 'all';
let editingId = null;
let selectedType = 'vision';
let selectedUrgency = 'immediate';
let subtasks = [];
let recognition = null;
let isListening = false;

const URGENCY_LABELS = { immediate:'⚡ Immediate (48hr)', week:'📅 This Week', month:'🗓 This Month', longterm:'🌅 Long-term' };
const URGENCY_ORDER = { immediate:0, week:1, month:2, longterm:3 };

function save() { localStorage.setItem('apostlesdesk_v2', JSON.stringify(instructions)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// SEARCH
function toggleSearch() {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open')) document.getElementById('searchInput').focus();
  else { document.getElementById('searchInput').value = ''; render(); }
}

// FILTER
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// VOICE INPUT
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Voice not supported in this browser');
    return;
  }
  if (isListening) {
    recognition.stop();
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onstart = () => { isListening = true; document.getElementById('micBtn').classList.add('listening'); };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    const field = document.getElementById('f-title');
    field.value = (field.value ? field.value + ' ' : '') + transcript;
  };
  recognition.onend = () => { isListening = false; document.getElementById('micBtn').classList.remove('listening'); };
  recognition.onerror = () => { isListening = false; document.getElementById('micBtn').classList.remove('listening'); };
  recognition.start();
}

// TYPE / URGENCY SELECT
function selectType(type, btn) {
  selectedType = type;
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('subtasksSection').style.display = type === 'project' ? 'block' : 'none';
}
function selectUrgency(urg, btn) {
  selectedUrgency = urg;
  document.querySelectorAll('.urgency-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// SUBTASKS
function addSubtask() {
  const input = document.getElementById('subtaskInput');
  const val = input.value.trim();
  if (!val) return;
  subtasks.push({ id: genId(), text: val, done: false });
  input.value = '';
  renderSubtaskList();
}
function toggleSubtask(id) {
  const st = subtasks.find(s => s.id === id);
  if (st) { st.done = !st.done; renderSubtaskList(); }
}
function removeSubtask(id) {
  subtasks = subtasks.filter(s => s.id !== id);
  renderSubtaskList();
}
function renderSubtaskList() {
  const list = document.getElementById('subtaskList');
  list.innerHTML = subtasks.map(s => `
    <div class="subtask-item">
      <input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleSubtask('${s.id}')">
      <span class="${s.done ? 'checked' : ''}">${s.text}</span>
      <button class="del-sub" onclick="removeSubtask('${s.id}')">×</button>
    </div>`).join('');
}

// OPEN ADD
function openAdd() {
  editingId = null;
  selectedType = 'vision';
  selectedUrgency = 'immediate';
  subtasks = [];
  document.getElementById('formTitle').textContent = 'New Instruction';
  document.getElementById('f-title').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-due').value = '';
  document.getElementById('subtasksSection').style.display = 'none';
  document.getElementById('subtaskList').innerHTML = '';
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector('.type-opt.vision').classList.add('selected');
  document.querySelectorAll('.urgency-opt').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.urgency-opt')[0].classList.add('selected');
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 350);
}

// SAVE
function saveInstruction() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  if (editingId) {
    const idx = instructions.findIndex(i => i.id === editingId);
    if (idx > -1) {
      instructions[idx] = { ...instructions[idx], title, type: selectedType, urgency: selectedUrgency,
        due: document.getElementById('f-due').value, notes: document.getElementById('f-notes').value.trim(),
        subtasks: [...subtasks] };
    }
    showToast('✅ Updated');
  } else {
    instructions.unshift({ id: genId(), title, type: selectedType, urgency: selectedUrgency,
      due: document.getElementById('f-due').value, notes: document.getElementById('f-notes').value.trim(),
      status: 'active', created: new Date().toISOString(), subtasks: [] });
    showToast('✅ Saved');
  }
  save(); closeSheet('addOverlay'); render();
}

// DETAIL
function openDetail(id) {
  const item = instructions.find(i => i.id === id);
  if (!item) return;
  const isDone = item.status === 'done';
  const overdue = !isDone && isOverdue(item.due);
  const subs = item.subtasks || [];
  const doneSubs = subs.filter(s => s.done).length;
  let subHtml = '';
  if (subs.length) {
    subHtml = `<div class="detail-subtasks"><strong>Sub-tasks (${doneSubs}/${subs.length})</strong>` +
      subs.map(s => `<div class="detail-sub-item">
        <input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleDetailSub('${id}','${s.id}')">
        <label class="${s.done ? 'checked' : ''}" onclick="toggleDetailSub('${id}','${s.id}')">${s.text}</label>
      </div>`).join('') + '</div>';
  }
  document.getElementById('detailSheet').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="detail-header">
      <div class="detail-type ${item.type}">${item.type.toUpperCase()}</div>
      <div class="detail-title">${item.title}</div>
    </div>
    <div class="detail-body">
      <div class="detail-row"><span class="key">Urgency</span><span class="val">${URGENCY_LABELS[item.urgency]||item.urgency}</span></div>
      <div class="detail-row"><span class="key">Status</span><span class="val">${isDone ? '✅ Complete' : '🔵 Active'}</span></div>
      <div class="detail-row"><span class="key">Received</span><span class="val">${formatDate(item.created)}</span></div>
      ${item.due ? `<div class="detail-row"><span class="key">Due</span><span class="val" style="${overdue?'color:var(--task)':''}">${overdue?'⚠️ Overdue — ':''}${formatDate(item.due)}</span></div>` : ''}
      ${item.notes ? `<div class="detail-notes"><strong>Notes</strong>${item.notes}</div>` : ''}
      ${subHtml}
    </div>
    ${!isDone ? `<button class="btn-full btn-complete" onclick="markDone('${id}')">✅ Mark Complete</button>` : `<button class="btn-full btn-complete" onclick="markActive('${id}')">↩️ Reopen</button>`}
    <button class="btn-full btn-edit" onclick="editItem('${id}')">✏️ Edit</button>
    <button class="btn-full btn-share" onclick="shareItem('${id}')">📤 Share</button>
    <button class="btn-full btn-delete" onclick="deleteItem('${id}')">🗑 Delete</button>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function toggleDetailSub(itemId, subId) {
  const item = instructions.find(i => i.id === itemId);
  if (!item) return;
  const sub = (item.subtasks||[]).find(s => s.id === subId);
  if (sub) { sub.done = !sub.done; save(); openDetail(itemId); }
}

function markDone(id) {
  const item = instructions.find(i => i.id === id);
  if (item) { item.status = 'done'; item.completedAt = new Date().toISOString(); save(); closeSheet('detailOverlay'); render(); showToast('✅ Marked complete'); }
}
function markActive(id) {
  const item = instructions.find(i => i.id === id);
  if (item) { item.status = 'active'; delete item.completedAt; save(); closeSheet('detailOverlay'); render(); showToast('↩️ Reopened'); }
}
function deleteItem(id) {
  if (!confirm('Delete this instruction?')) return;
  instructions = instructions.filter(i => i.id !== id);
  save(); closeSheet('detailOverlay'); render(); showToast('🗑 Deleted');
}
function editItem(id) {
  const item = instructions.find(i => i.id === id);
  if (!item) return;
  closeSheet('detailOverlay');
  editingId = id;
  selectedType = item.type;
  selectedUrgency = item.urgency;
  subtasks = JSON.parse(JSON.stringify(item.subtasks || []));
  document.getElementById('formTitle').textContent = 'Edit Instruction';
  document.getElementById('f-title').value = item.title;
  document.getElementById('f-notes').value = item.notes || '';
  document.getElementById('f-due').value = item.due || '';
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.type-opt.${item.type}`)?.classList.add('selected');
  const urgs = ['immediate','week','month','longterm'];
  document.querySelectorAll('.urgency-opt').forEach((b,i) => { b.classList.remove('selected'); if(urgs[i]===item.urgency)b.classList.add('selected'); });
  document.getElementById('subtasksSection').style.display = item.type === 'project' ? 'block' : 'none';
  renderSubtaskList();
  document.getElementById('addOverlay').classList.add('open');
}

function shareItem(id) {
  const item = instructions.find(i => i.id === id);
  if (!item) return;
  const subs = (item.subtasks||[]).map(s => `  ${s.done?'☑':'☐'} ${s.text}`).join('\n');
  const text = `APOSTLE'S DESK\n${'─'.repeat(30)}\nType: ${item.type.toUpperCase()}\nUrgency: ${URGENCY_LABELS[item.urgency]}\n${item.due ? 'Due: '+formatDate(item.due)+'\n' : ''}${'─'.repeat(30)}\n${item.title}${item.notes ? '\n\nNotes:\n'+item.notes : ''}${subs ? '\n\nSub-tasks:\n'+subs : ''}\n${'─'.repeat(30)}\nReceived: ${formatDate(item.created)}`;
  if (navigator.share) {
    navigator.share({ title: "Apostle's Desk", text });
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copied to clipboard'));
  }
}

function overlayClick(e, id) { if (e.target.classList.contains('overlay')) closeSheet(id); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d.includes('T') ? d : d + 'T12:00:00');
  return date.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function isOverdue(due) {
  if (!due) return false;
  return new Date(due + 'T00:00:00') < new Date(new Date().toDateString());
}

function render() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const active = instructions.filter(i => i.status !== 'done');
  document.getElementById('stat-vision').textContent = active.filter(i => i.type==='vision').length;
  document.getElementById('stat-task').textContent = active.filter(i => i.type==='task').length;
  document.getElementById('stat-project').textContent = active.filter(i => i.type==='project').length;

  let filtered = currentFilter === 'all' ? instructions.filter(i => i.status !== 'done')
    : currentFilter === 'done' ? instructions.filter(i => i.status === 'done')
    : instructions.filter(i => i.type === currentFilter && i.status !== 'done');

  if (q) filtered = filtered.filter(i => i.title.toLowerCase().includes(q) || (i.notes||'').toLowerCase().includes(q));

  filtered.sort((a, b) => (URGENCY_ORDER[a.urgency]??4) - (URGENCY_ORDER[b.urgency]??4));

  const container = document.getElementById('cards');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="icon">${currentFilter==='done'?'✅':q?'🔍':'📭'}</div><p>${q?'No results for "'+q+'"':currentFilter==='done'?'No completed items yet':'Nothing here yet'}</p></div>`;
    return;
  }

  let html = '';
  let lastUrgency = null;
  filtered.forEach(item => {
    if (!q && currentFilter === 'all' && item.urgency !== lastUrgency) {
      lastUrgency = item.urgency;
      const labels = { immediate:'⚡ Immediate', week:'📅 This Week', month:'🗓 This Month', longterm:'🌅 Long-term' };
      html += `<div class="section-label">${labels[item.urgency]||item.urgency}</div>`;
    }
    const isDone = item.status === 'done';
    const overdue = !isDone && isOverdue(item.due);
    const subs = item.subtasks || [];
    const doneSubs = subs.filter(s=>s.done).length;
    const subPct = subs.length ? Math.round(doneSubs/subs.length*100) : 0;
    html += `<div class="card ${isDone?'done':item.type}" onclick="openDetail('${item.id}')">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title">${item.title}</div>
          <span class="badge ${isDone?'done':item.type}">${isDone?'Done':item.type.charAt(0).toUpperCase()+item.type.slice(1)}</span>
        </div>
        <div class="card-meta">
          <span>${URGENCY_LABELS[item.urgency]||''}</span>
          ${item.due ? `<span class="${overdue?'overdue-tag':''}">${overdue?'⚠️ Overdue':('📅 '+formatDate(item.due))}</span>` : ''}
          ${item.urgency==='immediate'&&!isDone ? `<span><span class="urgent-dot"></span> Urgent</span>` : ''}
        </div>
        ${item.notes ? `<div class="card-notes">${item.notes}</div>` : ''}
        ${subs.length ? `<div class="subtask-preview"><div class="subtask-bar"><div class="subtask-fill" style="width:${subPct}%"></div></div><div class="subtask-label">${doneSubs}/${subs.length} steps done</div></div>` : ''}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

render();
</script>
</body>
</html>
