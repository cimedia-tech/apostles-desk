<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Apostle's Desk">
<meta name="theme-color" content="#1a1035">
<title>Apostle's Desk</title>
<style>
  :root {
    --bg: #0f0c24;
    --surface: #1a1640;
    --surface2: #231e52;
    --border: rgba(255,255,255,0.08);
    --text: #f0eeff;
    --muted: #9490b8;
    --vision: #c9a227;
    --vision-bg: rgba(201,162,39,0.12);
    --task: #e05252;
    --task-bg: rgba(224,82,82,0.12);
    --project: #4d9de0;
    --project-bg: rgba(77,157,224,0.12);
    --complete: #4caf7d;
    --complete-bg: rgba(76,175,125,0.10);
    --radius: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1035 0%, #2d1b6b 100%);
    padding: 54px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--vision); }
  .header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .add-btn {
    background: var(--vision);
    color: #000;
    border: none;
    border-radius: 50%;
    width: 42px; height: 42px;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-weight: 300;
    flex-shrink: 0;
  }

  /* FILTER TABS */
  .filters {
    display: flex;
    gap: 8px;
    padding: 14px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
    background: linear-gradient(135deg, #1a1035 0%, #2d1b6b 100%);
    padding-bottom: 14px;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active { color: #fff; border-color: transparent; }
  .filter-btn.active.all { background: var(--surface2); color: #fff; }
  .filter-btn.active.vision { background: var(--vision); color: #000; }
  .filter-btn.active.task { background: var(--task); color: #fff; }
  .filter-btn.active.project { background: var(--project); color: #fff; }

  /* STATS BAR */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 16px 20px;
  }
  .stat {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat.vision .num { color: var(--vision); }
  .stat.task .num { color: var(--task); }
  .stat.project .num { color: var(--project); }

  /* CARDS */
  .cards { padding: 0 20px 120px; display: flex; flex-direction: column; gap: 12px; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
    margin-bottom: 4px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
    active: transform 0.1s;
  }
  .card:active { transform: scale(0.98); }
  .card-accent { height: 4px; }
  .card.vision .card-accent { background: var(--vision); }
  .card.task .card-accent { background: var(--task); }
  .card.project .card-accent { background: var(--project); }
  .card.done .card-accent { background: var(--complete); }
  .card-body { padding: 14px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.3; flex: 1; }
  .card.done .card-title { opacity: 0.5; text-decoration: line-through; }
  .badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.vision { background: var(--vision-bg); color: var(--vision); }
  .badge.task { background: var(--task-bg); color: var(--task); }
  .badge.project { background: var(--project-bg); color: var(--project); }
  .badge.done { background: var(--complete-bg); color: var(--complete); }
  .card-meta {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .card-notes {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .urgent-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--task);
    display: inline-block;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 92dvh;
    overflow-y: auto;
    padding: 0 0 calc(var(--safe-bottom) + 20px);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 12px auto 20px;
  }
  .sheet-title {
    font-size: 18px;
    font-weight: 700;
    padding: 0 20px;
    margin-bottom: 20px;
  }

  /* FORM */
  .form-group { padding: 0 20px; margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    padding: 12px 14px;
    font-family: inherit;
    outline: none;
    -webkit-appearance: none;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--vision);
  }
  .form-group textarea { min-height: 90px; resize: none; }
  .type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .type-opt {
    padding: 12px 8px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .type-opt .icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .type-opt.selected.vision { border-color: var(--vision); background: var(--vision-bg); color: var(--vision); }
  .type-opt.selected.task { border-color: var(--task); background: var(--task-bg); color: var(--task); }
  .type-opt.selected.project { border-color: var(--project); background: var(--project-bg); color: var(--project); }
  .urgency-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .urgency-opt {
    padding: 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .urgency-opt.selected { border-color: var(--vision); background: var(--vision-bg); color: var(--vision); }
  .btn-row { display: flex; gap: 10px; padding: 0 20px; margin-top: 8px; }
  .btn-save {
    flex: 1;
    background: var(--vision);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-cancel {
    background: var(--surface2);
    color: var(--muted);
    border: none;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 16px;
    cursor: pointer;
  }
  .btn-delete {
    width: 100%;
    background: rgba(224,82,82,0.1);
    color: var(--task);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin: 12px 20px 0;
    width: calc(100% - 40px);
  }
  .btn-complete {
    width: calc(100% - 40px);
    background: var(--complete-bg);
    color: var(--complete);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin: 0 20px;
  }

  /* DETAIL VIEW */
  .detail-header {
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-type { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .detail-type.vision { color: var(--vision); }
  .detail-type.task { color: var(--task); }
  .detail-type.project { color: var(--project); }
  .detail-title { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .detail-body { padding: 16px 20px; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row .key { color: var(--muted); }
  .detail-row .val { font-weight: 600; text-align: right; max-width: 60%; }
  .detail-notes {
    margin-top: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--muted);
  }
  .detail-notes strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Apostle's <span>Desk</span></h1>
      <div class="subtitle">Christ Cathedral of Deliverance — Media Ministry</div>
    </div>
    <button class="add-btn" onclick="openAdd()">+</button>
  </div>
  <div class="filters">
    <button class="filter-btn active all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn vision" onclick="setFilter('vision', this)">Vision</button>
    <button class="filter-btn task" onclick="setFilter('task', this)">Tasks</button>
    <button class="filter-btn project" onclick="setFilter('project', this)">Projects</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
  </div>
</div>

<div class="stats">
  <div class="stat vision"><div class="num" id="stat-vision">0</div><div class="label">Vision</div></div>
  <div class="stat task"><div class="num" id="stat-task">0</div><div class="label">Tasks</div></div>
  <div class="stat project"><div class="num" id="stat-project">0</div><div class="label">Projects</div></div>
</div>

<div class="cards" id="cards"></div>

<!-- ADD/EDIT SHEET -->
<div class="overlay" id="addOverlay" onclick="overlayClick(event, 'addOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="formTitle">New Instruction</div>

    <div class="form-group">
      <label>Type</label>
      <div class="type-grid">
        <button class="type-opt vision selected" onclick="selectType('vision', this)"><span class="icon">👁</span>Vision</button>
        <button class="type-opt task" onclick="selectType('task', this)"><span class="icon">⚡</span>Task</button>
        <button class="type-opt project" onclick="selectType('project', this)"><span class="icon">📋</span>Project</button>
      </div>
    </div>

    <div class="form-group">
      <label>Instruction</label>
      <textarea id="f-title" placeholder="What did Apostle Lykes say or instruct?"></textarea>
    </div>

    <div class="form-group">
      <label>Urgency</label>
      <div class="urgency-grid">
        <button class="urgency-opt selected" onclick="selectUrgency('immediate', this)">⚡ Immediate (48hr)</button>
        <button class="urgency-opt" onclick="selectUrgency('week', this)">📅 This Week</button>
        <button class="urgency-opt" onclick="selectUrgency('month', this)">🗓 This Month</button>
        <button class="urgency-opt" onclick="selectUrgency('longterm', this)">🌅 Long-term</button>
      </div>
    </div>

    <div class="form-group">
      <label>Due Date (optional)</label>
      <input type="date" id="f-due">
    </div>

    <div class="form-group">
      <label>Notes / Context</label>
      <textarea id="f-notes" placeholder="Additional context, background, or details..."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSheet('addOverlay')">Cancel</button>
      <button class="btn-save" onclick="saveInstruction()">Save</button>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="detailOverlay" onclick="overlayClick(event, 'detailOverlay')">
  <div class="sheet" id="detailSheet"></div>
</div>

<script>
let instructions = JSON.parse(localStorage.getItem('apostlesdesk') || '[]');
let currentFilter = 'all';
let editingId = null;
let selectedType = 'vision';
let selectedUrgency = 'immediate';

const URGENCY_LABELS = {
  immediate: '⚡ Immediate (48hr)',
  week: '📅 This Week',
  month: '🗓 This Month',
  longterm: '🌅 Long-term'
};

function save() {
  localStorage.setItem('apostlesdesk', JSON.stringify(instructions));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openAdd() {
  editingId = null;
  selectedType = 'vision';
  selectedUrgency = 'immediate';
  document.getElementById('formTitle').textContent = 'New Instruction';
  document.getElementById('f-title').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-due').value = '';
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector('.type-opt.vision').classList.add('selected');
  document.querySelectorAll('.urgency-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector('.urgency-opt').classList.add('selected');
  document.getElementById('addOverlay').classList.add('open');
}

function selectType(type, btn) {
  selectedType = type;
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function selectUrgency(urg, btn) {
  selectedUrgency = urg;
  document.querySelectorAll('.urgency-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function saveInstruction() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  if (editingId) {
    const idx = instructions.findIndex(i => i.id === editingId);
    if (idx > -1) {
      instructions[idx] = {
        ...instructions[idx],
        title,
        type: selectedType,
        urgency: selectedUrgency,
        due: document.getElementById('f-due').value,
        notes: document.getElementById('f-notes').value.trim(),
      };
    }
  } else {
    instructions.unshift({
      id: genId(),
      title,
      type: selectedType,
      urgency: selectedUrgency,
      due: document.getElementById('f-due').value,
      notes: document.getElementById('f-notes').value.trim(),
      status: 'active',
      created: new Date().toISOString(),
    });
  }
  save();
  closeSheet('addOverlay');
  render();
}

function openDetail(id) {
  const item = instructions.find(i => i.id === id);
  if (!item) return;
  const sheet = document.getElementById('detailSheet');
  const typeColor = item.type;
  const isDone = item.status === 'done';
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="detail-header">
      <div class="detail-type ${typeColor}">${item.type.toUpperCase()}</div>
      <div class="detail-title">${item.title}</div>
    </div>
    <div class="detail-body">
      <div class="detail-row"><span class="key">Urgency</span><span class="val">${URGENCY_LABELS[item.urgency] || item.urgency}</span></div>
      <div class="detail-row"><span class="key">Status</span><span class="val">${isDone ? '✅ Complete' : '🔵 Active'}</span></div>
      <div class="detail-row"><span class="key">Received</span><span class="val">${formatDate(item.created)}</span></div>
      ${item.due ? `<div class="detail-row"><span class="key">Due</span><span class="val">${formatDate(item.due)}</span></div>` : ''}
      ${item.notes ? `<div class="detail-notes"><strong>Notes</strong>${item.notes}</div>` : ''}
    </div>
    ${!isDone ? `<button class="btn-complete" onclick="markDone('${id}')">✅ Mark Complete</button>` : ''}
    <button class="btn-cancel" style="width:calc(100% - 40px);margin:10px 20px 0;display:block;" onclick="editItem('${id}')">✏️ Edit</button>
    <button class="btn-delete" onclick="deleteItem('${id}')">🗑 Delete</button>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function markDone(id) {
  const item = instructions.find(i => i.id === id);
  if (item) { item.status = 'done'; save(); closeSheet('detailOverlay'); render(); }
}

function deleteItem(id) {
  if (!confirm('Delete this instruction?')) return;
  instructions = instructions.filter(i => i.id !== id);
  save(); closeSheet('detailOverlay'); render();
}

function editItem(id) {
  const item = instructions.find(i => i.id === id);
  if (!item) return;
  closeSheet('detailOverlay');
  editingId = id;
  selectedType = item.type;
  selectedUrgency = item.urgency;
  document.getElementById('formTitle').textContent = 'Edit Instruction';
  document.getElementById('f-title').value = item.title;
  document.getElementById('f-notes').value = item.notes || '';
  document.getElementById('f-due').value = item.due || '';
  document.querySelectorAll('.type-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.type-opt.${item.type}`)?.classList.add('selected');
  document.querySelectorAll('.urgency-opt').forEach((b, i) => {
    b.classList.remove('selected');
    const urgs = ['immediate','week','month','longterm'];
    if (urgs[i] === item.urgency) b.classList.add('selected');
  });
  document.getElementById('addOverlay').classList.add('open');
}

function overlayClick(e, id) {
  if (e.target.classList.contains('overlay')) closeSheet(id);
}

function closeSheet(id) {
  document.getElementById(id).classList.remove('open');
}

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function isOverdue(due) {
  if (!due) return false;
  return new Date(due) < new Date(new Date().toDateString());
}

function render() {
  const active = instructions.filter(i => i.status !== 'done');
  document.getElementById('stat-vision').textContent = active.filter(i => i.type === 'vision').length;
  document.getElementById('stat-task').textContent = active.filter(i => i.type === 'task').length;
  document.getElementById('stat-project').textContent = active.filter(i => i.type === 'project').length;

  let filtered = currentFilter === 'all' ? instructions.filter(i => i.status !== 'done')
    : currentFilter === 'done' ? instructions.filter(i => i.status === 'done')
    : instructions.filter(i => i.type === currentFilter && i.status !== 'done');

  // Sort: immediate first, then by due date
  filtered.sort((a, b) => {
    const urgOrder = { immediate: 0, week: 1, month: 2, longterm: 3 };
    return (urgOrder[a.urgency] ?? 4) - (urgOrder[b.urgency] ?? 4);
  });

  const container = document.getElementById('cards');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty"><div class="icon">${currentFilter === 'done' ? '✅' : '📭'}</div><p>${currentFilter === 'done' ? 'No completed items yet' : 'No instructions here yet'}</p></div>`;
    return;
  }

  let html = '';
  let lastUrgency = null;
  filtered.forEach(item => {
    if (currentFilter === 'all' && item.urgency !== lastUrgency) {
      lastUrgency = item.urgency;
      const labels = { immediate: '⚡ Immediate', week: '📅 This Week', month: '🗓 This Month', longterm: '🌅 Long-term' };
      html += `<div class="section-label">${labels[item.urgency] || item.urgency}</div>`;
    }
    const isDone = item.status === 'done';
    const overdue = !isDone && isOverdue(item.due);
    html += `
      <div class="card ${isDone ? 'done' : item.type}" onclick="openDetail('${item.id}')">
        <div class="card-accent"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-title">${item.title}</div>
            <span class="badge ${isDone ? 'done' : item.type}">${isDone ? 'Done' : item.type.charAt(0).toUpperCase() + item.type.slice(1)}</span>
          </div>
          <div class="card-meta">
            <span>${URGENCY_LABELS[item.urgency] || ''}</span>
            ${item.due ? `<span style="color:${overdue ? 'var(--task)' : 'var(--muted)'}">${overdue ? '⚠️ Overdue' : '📅 ' + formatDate(item.due)}</span>` : ''}
            ${item.urgency === 'immediate' && !isDone ? `<span><span class="urgent-dot"></span> Urgent</span>` : ''}
          </div>
          ${item.notes ? `<div class="card-notes">${item.notes}</div>` : ''}
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

render();
</script>
</body>
</html>
